<header class="navbar navbar-expand-lg sticky-top">
    <nav class="container-xxl">
        <a class="navbar-brand" href="{% link index.md %}">
            <i class="las la-terminal"></i>
            <strong>{{ site.title }}</strong>
        </a>
        <div class="d-flex ms-auto">
            <ul class="navbar-nav flex-row">
                <li class="nav-item">
                    <a class="nav-link" href="https://github.com/bad1dea5">
                        <i class="lab la-github"></i>
                    </a>
                </li>
                <li class="nav-item">
                    <div class="dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="las la-list-ul"></i>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end position-absolute">
                            <li><h6 class="dropdown-header">Repositories</h6></li>
                            {% for project in site.data.projects %}
                            <li><a class="dropdown-item small" href="{{ project.url }}">
                                <img src="https://img.shields.io/badge/0.1.0-{{ project.name }}-red">
                            </a></li>
                            {% endfor %}
                        </ul>
                    </div>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% link about.md %}">
                        <i class="las la-question-circle"></i>
                    </a>
                </li>
            </ul>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
            <i class="las la-ellipsis-h"></i>
        </button>
    </nav>
</header>
